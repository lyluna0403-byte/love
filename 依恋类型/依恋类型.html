const ensureSeedCodes = async () => {
  if (!supabase) throw new Error('系统配置未完成，请联系管理员');
  const { count, error } = await supabase.from('redeem_codes').select('*', { count: 'exact', head: true });
  if (error) throw error;
  if ((count || 0) === 0) throw new Error('redeem_codes 为空，请先在 Supabase 执行初始化 SQL');
};

const getRedeemCodeRecord = async (code) => {
  const normalized = code.trim().toUpperCase();
  if (normalized === SUPER_REDEEM_CODE) return { code: SUPER_REDEEM_CODE, is_used: false };
  if (!supabase) throw new Error('系统配置未完成，请联系管理员');
  const { data: row, error: findError } = await supabase
    .from('redeem_codes')
    .select('code,is_used,used_session_id')
    .eq('code', normalized)
    .maybeSingle();
  if (findError) throw findError;
  if (!row) throw new Error('兑换码不存在，请检查后重试');
  return row;
};

const getLatestSubmissionByCode = async (code) => {
  if (!supabase) return null;
  const { data, error } = await supabase
    .from('attachment_submissions')
    .select('id,session_id,answers,results,submitted_at')
    .eq('redeem_code', code)
    .order('submitted_at', { ascending: false })
    .limit(1)
    .maybeSingle();
  if (error) throw error;
  return data || null;
};

const markRedeemCodeUsed = async (code, sessionId) => {
  if (!supabase) throw new Error('系统配置未完成，请联系管理员');
  const { data: updated, error: updateError } = await supabase
    .from('redeem_codes')
    .update({ is_used: true, used_at: new Date().toISOString(), used_session_id: sessionId })
    .eq('code', code)
    .eq('is_used', false)
    .select('code')
    .maybeSingle();
  if (updateError) throw updateError;
  if (!updated) throw new Error('该兑换码已被使用');
  return updated.code;
};

const saveSubmission = async (payload) => {
  if (!supabase) throw new Error('系统配置未完成，请联系管理员');
  const { error } = await supabase.from('attachment_submissions').insert(payload);
  if (error) throw error;
};

        <GlassCard className="p-8 md:p-12 animate-in fade-in slide-in-from-bottom-4 duration-1000">
          <div className="text-center space-y-4 mb-10 relative z-10">
            <span className="inline-block px-4 py-1 rounded-full bg-white/90 text-[#8C7D75] text-xs tracking-[0.2em] font-sans border border-white shadow-sm">疗愈 / HEALING</span>
            <h2 className="text-2xl md:text-3xl font-serif text-[#443B36] tracking-widest leading-relaxed mt-4">如何迈向安全型依恋？</h2>
          </div>

          <div className="font-light text-[#6B5D56] leading-[2.2] space-y-8 text-[15px] relative z-10">
            <p className="text-justify font-medium text-[#443B36]">在谈疗愈前，我们先聊聊你的依恋类型是如何形成的？</p>
            <p className="text-justify">依恋类型的形成，是一场从童年早期开始，并伴随你一生经历不断重塑的动态过程：</p>
            
            <div className="space-y-4 bg-white/90 p-6 rounded-2xl border border-white shadow-[0_2px_15px_rgba(0,0,0,0.02)] relative overflow-hidden group">
              <h3 className="font-serif text-[#443B36] text-[17px] font-medium flex items-center pl-2">
                <Leaf className="w-5 h-5 mr-2 text-[#8C7D75] shrink-0" />
                阶段一：童年早期的情感蓝图
              </h3>
              <p className="text-justify text-[#8C7D75] text-[14px] pl-2">生命最初的几年，特别是你与主要照顾者（通常是母亲和父亲）的互动，奠定了你依恋模式的基石。对于婴儿来说，照顾者就是整个世界。</p>
              <ul className="space-y-3 pl-6 mt-4">
                <li className="text-justify text-[14px]"><strong className={`font-serif font-medium ${attachmentTypes.secure.color}`}>安全型的形成：</strong>如果你的需求得到了及时、一致且温暖的回应，你就会内化一种信念：“我是值得被爱的，世界是安全的”。</li>
                <li className="text-justify text-[14px]"><strong className={`font-serif font-medium ${attachmentTypes.anxious.color}`}>焦虑型的形成：</strong>如果父母的回应是“时有时无、难以预测”的，你为了确保存活，就必须时刻保持警惕，用哭闹或讨好来抓住大人的注意力，从而形成了患得患失的焦虑底色。</li>
                <li className="text-justify text-[14px]"><strong className={`font-serif font-medium ${attachmentTypes.avoidant.color}`}>回避型的形成：</strong>如果父母在情感上长期缺席、冷漠或排斥你的哭泣，你就会痛苦地意识到“表达需求是没用的，甚至会被拒绝”。于是你学会了关闭情感通道，表现出伪装的“极致独立”。</li>
                <li className="text-justify text-[14px]"><strong className={`font-serif font-medium ${attachmentTypes.fearful.color}`}>恐惧型的形成：</strong>如果本该保护你的父母，本身就是恐惧的来源，你的神经系统就会陷入死机——既想靠近他们求生，又必须远离他们保命，最终形成极度混乱的拉扯。</li>
              </ul>
            </div>

            <div className="space-y-4 bg-white/90 p-6 rounded-2xl border border-white shadow-[0_2px_15px_rgba(0,0,0,0.02)] relative overflow-hidden">
              <h3 className="font-serif text-[#443B36] text-[17px] font-medium flex items-center pl-2">
                 <Wind className="w-5 h-5 mr-2 text-[#8C7D75] shrink-0" />
                 阶段二：后天关系经验的重塑
              </h3>
              <p className="text-justify text-[#8C7D75] text-[14px] pl-2">虽然童年打下了基础，但依恋模式并非终身监禁。你的大脑具有神经可塑性，后天的重大关系经历会在你的“初始蓝图”上进行修改，这正是为什么你会对不同的人有不同的特定依恋类型。</p>
              <ul className="space-y-3 pl-6 mt-4">
                <li className="text-justify text-[14px]"><strong className="font-serif font-medium text-[#443B36]">关系创伤：</strong>遭遇霸凌、糟糕的恋爱经历，足以在几个月内硬生生把一个安全型的人“砸”出一个特定于某角色的不安全坑洞。</li>
                <li className="text-justify text-[14px]"><strong className="font-serif font-medium text-[#443B36]">获得性安全：</strong>正向的经历同样具有重塑力量。如果遇到了一位极度包容、情绪稳定的“安全型”伴侣，或通过深度心理咨询，大脑会重新学习健康的爱。<strong>这种后天习得的安全感，被称为“获得性安全型依恋”。</strong></li>
              </ul>
            </div>
          </div>

          <div className="pt-10 mt-10 border-t border-[#F2EAE5] border-dashed relative z-10">
             <h3 className="font-serif text-[#443B36] text-xl text-center mb-8 font-medium">那么，要如何迈向获得性安全型依恋呢？</h3>
             
             <div className="p-6 rounded-2xl border border-white shadow-sm mb-8 relative overflow-hidden bg-white/90">
              <h4 className="font-serif text-[#443B36] tracking-widest mb-3 font-medium pl-2 flex items-center">
                <span className="mr-2 text-lg drop-shadow-sm inline-flex items-center justify-center w-5 h-5 leading-none" style={{ color: domStyle.hex }}>✦</span>
                觉察你的核心盲区
              </h4>
              <p className="font-light text-[#6B5D56] text-[14px] leading-relaxed italic text-justify pl-8">
                “{advice.blindSpot}”
              </p>
            </div>

            <div className="space-y-5">
              <h4 className="font-serif text-[#443B36] tracking-widest mb-6 font-medium text-center">专属成长建议</h4>
              {advice.advice.map((item, idx) => (
                <div key={idx} className="bg-white/90 p-5 rounded-xl border border-white shadow-sm hover:shadow-md transition-shadow">
                  <p className="font-serif text-[#443B36] tracking-wider mb-2 text-[15px] font-medium flex items-center">
                    <span className="mr-2 text-lg drop-shadow-sm inline-flex items-center justify-center w-5 h-5 leading-none" style={{ color: domStyle.hex }}>✦</span>
                    {item.t}
                  </p>
                  <p className="font-light text-[#6B5D56] text-[14px] leading-relaxed text-justify pl-6">
                    {item.d}
                  </p>
                </div>
              ))}
            </div>
          </div>

          <div className="pt-12 mt-12 border-t border-[#F2EAE5] text-center space-y-6 relative z-10">
            {saveMessage && <p className="text-sm text-[#8C7D75]">{saveMessage}</p>}
            <p className="font-serif text-[#8C7D75] text-[15px] tracking-widest">如果有需要可以添加心理咨询师微信</p>
            <div className="flex items-center justify-center p-3 bg-white/90 rounded-2xl shadow-sm border border-white w-fit mx-auto min-w-[150px] min-h-[150px] backdrop-blur-sm">
              {!qrLoadFailed ? (
                <img
                  src={COUNSELOR_QR_SOURCES[qrSourceIndex]}
                  alt="咨询师微信"
                  className="w-[140px] h-[140px] rounded-xl object-contain transition-all hover:opacity-100 block mx-auto"
                  loading="lazy"
                  decoding="async"
                  referrerPolicy="no-referrer"
                  onLoad={() => setQrLoadFailed(false)}
                  onError={() => {
                    if (qrSourceIndex < COUNSELOR_QR_SOURCES.length - 1) {
                      setQrSourceIndex((prev) => prev + 1);
                    } else {
                      setQrLoadFailed(true);
                    }
                  }}
                />
              ) : (
                <div className="w-[140px] h-[140px] rounded-xl bg-white flex items-center justify-center text-[#A69992] text-xs text-center leading-relaxed px-3">
                  二维码加载失败<br />请联系管理员
                </div>
              )}
            </div>
            <p className="text-[11px] text-[#A69992] tracking-[0.2em] font-sans">长按识别 · 开启疗愈</p>
          </div>
        </GlassCard>
      );
    };

    return (
      <div className={pageContainerClass}>
        <ImpressionistBackground />

        <div className="max-w-3xl mx-auto px-4 sm:px-6 pt-16 relative z-10">
          {reportPage === 1 && <Page1 />}
          {reportPage === 2 && <Page2 />}
          {reportPage === 3 && <Page3 />}
          {reportPage === 4 && <Page4 />}
          <Pagination />
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
